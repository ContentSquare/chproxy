# Simple Cache TTL Test Configuration
# This configuration can be used to test TTL settings without requiring Redis

hack_me_please: true

server:
  http:
    listen_addr: ":9090"

caches:
  # Test cache with 30 second TTL
  - name: "test_cache"
    mode: "file_system"
    file_system:
      dir: "/tmp/chproxy-test-cache"
      max_size: 100Mb
    expire: 30s              # Cache expires after 30 seconds
    max_payload_size: 10Mb

clusters:
  - name: "test_cluster"
    nodes: ["localhost:8123"]
    users:
      - name: "default"
        password: ""

users:
  - name: "test_user"
    password: "test123"
    to_cluster: "test_cluster"
    to_user: "default"
    cache: "test_cache"
    max_execution_time: 1m
